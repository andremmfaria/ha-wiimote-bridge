configuration:
  radios:
    name: Radio
    description: Elenco delle radio ESP32. Ogni voce deve includere port, baud e controller_id.
  discover_enabled:
    name: MQTT Discovery
    description: Abilita o disabilita la pubblicazione delle configurazioni MQTT Discovery per Home Assistant.
  mqtt_host:
    name: Host MQTT
    description: Nome host del broker MQTT che riceve gli eventi del Wii Remote.
  mqtt_port:
    name: Porta MQTT
    description: Porta TCP del broker MQTT.
  mqtt_username:
    name: Nome utente MQTT
    description: Nome utente opzionale per l'autenticazione al broker.
  mqtt_password:
    name: Password MQTT
    description: Password opzionale per l'autenticazione al broker.
  topic_prefix:
    name: Prefisso topic MQTT
    description: Prefisso usato per tutti i topic MQTT pubblicati.
  log_level:
    name: Livello di log
    description: Controlla quanti dettagli l'applicazione scrive nel registro del componente aggiuntivo.
