configuration:
  radios:
    name: Radioenheder
    description: Liste over ESP32-radioenheder. Hver post skal indeholde port, baud og controller_id.
  mqtt_host:
    name: MQTT-vært
    description: Værtsnavn på MQTT-broker, der modtager Wii Remote-hændelser.
  mqtt_port:
    name: MQTT-port
    description: TCP-port for MQTT-brokeren.
  mqtt_username:
    name: MQTT-brugernavn
    description: Valgfrit brugernavn til broker-godkendelse.
  mqtt_password:
    name: MQTT-adgangskode
    description: Valgfri adgangskode til broker-godkendelse.
  topic_prefix:
    name: MQTT-emnepræfiks
    description: Præfiks brugt til alle publicerede MQTT-emner.
  log_level:
    name: Logniveau
    description: Styrer, hvor mange detaljer programmet skriver til add-on-loggen.
