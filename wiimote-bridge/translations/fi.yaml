configuration:
  radios:
    name: Radiot
    description: Luettelo ESP32-radioista. Jokaisessa merkinnässä on oltava port, baud ja controller_id.
  mqtt:
    name: MQTT
    description: MQTT-yhteyden ja julkaisemisen asetukset. (laajenna muokataksesi)
    fields:
      host:
        name: Isäntä
        description: MQTT-välittäjän isäntänimi, joka vastaanottaa Wii Remote -tapahtumat.
      port:
        name: Portti
        description: Välittäjän portti. Käytä arvoa 0 automaattisille oletusarvoille määrityksen perusteella (tcp 1883, websockets 1884, tcp/ssl 8883, websockets/ssl 8884).
      username:
        name: Käyttäjätunnus
        description: Valinnainen käyttäjätunnus välittäjän todennusta varten.
      password:
        name: Salasana
        description: Valinnainen salasana välittäjän todennusta varten.
      transport:
        name: Siirtotapa
        description: MQTT-siirtotila. Oletus on tcp.
      ssl:
        name: SSL
        description: Ottaa TLS-salauksen käyttöön MQTT:lle. Oletuksena pois käytöstä.
      ssl_insecure:
        name: SSL ilman varmenteen tarkistusta
        description: Poistaa TLS-varmenneketjun tarkistuksen käytöstä itse isännöidyille varmenteille. Oletuksena pois käytöstä.
      topic_prefix:
        name: Aiheiden etuliite
        description: Etuliite, jota käytetään kaikissa julkaistuissa MQTT-aiheissa. Oletus on wiimote.
      discover_enabled:
        name: MQTT Discovery
        description: Ottaa käyttöön tai poistaa käytöstä Home Assistantin MQTT Discovery -asetusten julkaisemisen.
  log_level:
    name: Lokitaso
    description: Määrittää, kuinka paljon yksityiskohtia sovellus kirjoittaa lisäosan lokiin.
