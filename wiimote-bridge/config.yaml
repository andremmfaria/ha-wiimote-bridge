name: "WiiMote Bridge"
version: "0.4.5"
slug: "wiimote_bridge"
description: |
  Bridge a Nintendo Wii Remote to Home Assistant using an ESP32 over USB serial.
  Button events are published to MQTT topics for use in automations.
url: "https://github.com/andremmfaria/ha-wiimote-bridge"
homeassistant: "2024.1.0"
# Optional defaults (left commented to satisfy the add-on linter):
# https://developers.home-assistant.io/docs/add-ons/configuration/
# stage: stable
# auth_api: false
# hassio_api: false
# homeassistant_api: false
# apparmor: true
# startup: application
# boot: auto
privileged: []
image: "ghcr.io/andremmfaria/{arch}-addon-wiimote-bridge"
arch:
  - amd64
  - aarch64
init: false
services:
  - mqtt:want

uart: true

options:
  radios:
    - port: "/dev/ttyUSB0"
      baud: 115200
      controller_id: 1
  mqtt:
    topic_prefix: "wiimote"
    discover_enabled: true
    username: ""
    password: ""
    host: "core-mosquitto"
    port: 0
    transport: "tcp"
    ssl: false
    ssl_insecure: false
  log_level: "info"
  health_port: 9000

schema:
  radios:
    - port: device(subsystem=tty)
      baud: int
      controller_id: int
  mqtt: 
    topic_prefix: str
    discover_enabled: bool
    username: str
    password: password
    host: str
    port: int
    transport: list(tcp|websockets)
    ssl: bool
    ssl_insecure: bool
  log_level: list(debug|info|warning|error)
  health_port: int
