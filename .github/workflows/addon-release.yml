name: Add-on Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate tag matches add-on version
        id: version
        run: |
          config_version="$(sed -n 's/^version:[[:space:]]*"\{0,1\}\([^\"]*\)"\{0,1\}$/\1/p' wiimote-bridge/config.yaml)"
          tag_version="${GITHUB_REF_NAME#v}"

          if [ -z "${config_version}" ]; then
            echo "Unable to read version from wiimote-bridge/config.yaml" >&2
            exit 1
          fi

          if [ "${config_version}" != "${tag_version}" ]; then
            echo "Tag version ${tag_version} does not match add-on version ${config_version}" >&2
            exit 1
          fi

          echo "version=${config_version}" >> "${GITHUB_OUTPUT}"

  build:
    name: Publish (${{ matrix.arch }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base:3.19
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base:3.19

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push add-on image
        uses: docker/build-push-action@v7
        with:
          context: ./wiimote-bridge
          file: ./wiimote-bridge/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/andremmfaria/${{ matrix.arch }}-addon-wiimote-bridge:${{ needs.prepare.outputs.version }}
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_FROM=${{ matrix.build_from }}
            BUILD_VERSION=${{ needs.prepare.outputs.version }}

  firmware:
    name: Build Firmware Binary
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/
          arduino-cli core update-index

      - name: Install ESP32 core and dependencies
        run: |
          arduino-cli core install esp32:esp32@3.3.7
          arduino-cli lib update-index
          arduino-cli lib install ESP32Wiimote

      - name: Compile firmware
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32 --output-dir /tmp/firmware ./esp32/wiimote-serial-bridge
          cp /tmp/firmware/wiimote-serial-bridge.ino.bin /tmp/firmware/wiimote-serial-bridge.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: wiimote-serial-bridge-bin
          path: /tmp/firmware/wiimote-serial-bridge.bin
          if-no-files-found: error

  release:
    needs:
      - prepare
      - build
      - firmware
    runs-on: ubuntu-latest
    steps:
      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: wiimote-serial-bridge-bin
          path: .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: WiiMote Bridge ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: |
            wiimote-serial-bridge.bin
