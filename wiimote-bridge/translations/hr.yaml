configuration:
  radios:
    name: Radiji
    description: Popis ESP32 radija. Svaki unos mora sadržavati port, baud i controller_id.
  mqtt:
    name: MQTT
    description: Postavke MQTT povezivanja i objavljivanja. (proširi za izmjenu)
    fields:
      host:
        name: Host
        description: Naziv hosta MQTT brokera koji prima događaje Wii Remote kontrolera.
      port:
        name: Priključak
        description: Port brokera. Koristite 0 za automatske zadane vrijednosti prema konfiguraciji (tcp 1883, websockets 1884, tcp/ssl 8883, websockets/ssl 8884).
      username:
        name: Korisničko ime
        description: Neobavezno korisničko ime za autentikaciju na brokeru.
      password:
        name: Lozinka
        description: Neobavezna lozinka za autentikaciju na brokeru.
      transport:
        name: Prijenos
        description: Način MQTT prijenosa. Zadano je tcp.
      ssl:
        name: SSL
        description: Omogućuje TLS enkripciju za MQTT. Zadano je onemogućeno.
      ssl_insecure:
        name: SSL bez provjere certifikata
        description: Onemogućuje provjeru lanca TLS certifikata za self-hosted certifikate. Zadano je onemogućeno.
      topic_prefix:
        name: Prefiks tema
        description: Prefiks koji se koristi za sve objavljene MQTT teme. Zadano je wiimote.
      discover_enabled:
        name: MQTT Discovery
        description: Omogućuje ili onemogućuje objavu MQTT Discovery konfiguracija za Home Assistant.
  log_level:
    name: Razina zapisivanja
    description: Upravlja količinom pojedinosti koje aplikacija zapisuje u dnevnik dodatka.
