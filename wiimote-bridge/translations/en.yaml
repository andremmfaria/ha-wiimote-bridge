configuration:
  radios:
    name: Radios
    description: List of ESP32 radios. Each entry needs port, baud, and controller_id.
  discover_enabled:
    name: MQTT discovery
    description: Enables or disables publishing Home Assistant MQTT Discovery configs.
  mqtt_host:
    name: MQTT host
    description: Hostname of the MQTT broker that receives Wii Remote events.
  mqtt_port:
    name: MQTT port
    description: TCP port of the MQTT broker.
  mqtt_username:
    name: MQTT username
    description: Optional username for broker authentication.
  mqtt_password:
    name: MQTT password
    description: Optional password for broker authentication.
  topic_prefix:
    name: MQTT topic prefix
    description: Prefix used for all published MQTT topics.
  log_level:
    name: Log level
    description: Controls how much detail the application writes to the add-on log.
