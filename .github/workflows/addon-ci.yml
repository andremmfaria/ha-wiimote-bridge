name: Add-on CI

on:
  pull_request:
    paths:
      - .github/workflows/addon-*.yml
      - wiimote-bridge/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/addon-*.yml
      - wiimote-bridge/**

permissions:
  contents: read

jobs:
  test:
    name: Test (uv + pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv==0.10.9

      - name: Run tests
        working-directory: ./wiimote-bridge/app
        run: uv run --dev pytest -q

  build:
    name: Build (${{ matrix.arch }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base:3.19
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base:3.19
          - arch: armv7
            platform: linux/arm/v7
            build_from: ghcr.io/home-assistant/armv7-base:3.19
          - arch: i386
            platform: linux/386
            build_from: ghcr.io/home-assistant/i386-base:3.19

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build add-on image
        uses: docker/build-push-action@v6
        with:
          context: ./wiimote-bridge
          file: ./wiimote-bridge/Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          tags: local/wiimote-bridge:${{ matrix.arch }}-test
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_FROM=${{ matrix.build_from }}
            BUILD_VERSION=test
