configuration:
  serial_port:
    name: Puerto serie
    description: Dispositivo serie expuesto por el ESP32 en el host de Home Assistant.
  serial_baud:
    name: Velocidad en baudios del puerto serie
    description: Velocidad en baudios usada por el firmware del ESP32.
  mqtt_host:
    name: Host MQTT
    description: Nombre del host del broker MQTT que recibe los eventos del Wii Remote.
  mqtt_port:
    name: Puerto MQTT
    description: Puerto TCP del broker MQTT.
  mqtt_username:
    name: Usuario MQTT
    description: Usuario opcional para la autenticación del broker.
  mqtt_password:
    name: Contraseña MQTT
    description: Contraseña opcional para la autenticación del broker.
  topic_prefix:
    name: Prefijo de tema MQTT
    description: Prefijo usado para todos los temas MQTT publicados.
