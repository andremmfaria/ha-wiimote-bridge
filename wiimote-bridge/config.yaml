name: "WiiMote Bridge"
version: "0.4.0"
slug: "wiimote_bridge"
description: |
  Bridge a Nintendo Wii Remote to Home Assistant using an ESP32 over USB serial.
  Button events are published to MQTT topics for use in automations.
url: "https://github.com/andremmfaria/ha-wiimote-bridge"
image: "ghcr.io/andremmfaria/{arch}-addon-wiimote-bridge"
arch:
  - amd64
  - aarch64
  - armv7
  - i386
startup: application
boot: auto
init: false
services:
  - mqtt:want

uart: true

options:
  radios:
    - port: "/dev/ttyUSB0"
      baud: 115200
      controller_id: 1
  discover_enabled: true
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  topic_prefix: "wiimote"
  log_level: "info"

schema:
  radios:
    - port: device(subsystem=tty)
      baud: int
      controller_id: int
  discover_enabled: bool
  mqtt_host: str
  mqtt_port: port
  mqtt_username: str
  mqtt_password: password
  topic_prefix: str
  log_level: list(debug|info|warning|error)
